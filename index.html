<!DOCTYPE html>
<html>
<title>BankForm</title>
<head>
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <script src="js/logic.js"></script>
<style>

        .form-group {
            margin-top: 30px;
        }

        .submit-btn {
            margin-top: 30px;
            background-color: #28a745;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.35s ease;
        }

        .submit-btn:hover {
            background-color: #208136;
            transform: scale(1.12) translateY(-3px);
            box-shadow: 0px 8px 18px rgba(0, 0, 0, 0.35);
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-md-12">

                <form id="form">

                    <div class="row">

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="Enter your name" name="name" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="Enter your father name" name="father_name" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="Enter Aadhaar " name="aadhaar_number" maxlength="12" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="email" class="form-control" placeholder="Enter Email" name="email" required="@">
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="password" class="form-control" placeholder="Enter password" name="password" minlength="6" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <select class="form-control" name="education">
                                <option value="">Select an option</option>
                                <option value="10th">10th</option>
                                <option value="12th">12th</option>
                                <option value="Graduate">Graduate</option>
                                <option value="Masters">Masters</option>
                                <option value="PHD">PHD</option>
                            </select>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <select class="form-control" name="gender">
                                <option value="">Gender</option>
                                <option value="MALE">MALE</option>
                                <option value="FEMALE">FEMALE</option>
                            </select>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="date" class="form-control" name="dob">
                        </div>

                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <h2>Bank details information</h2>
                        </div>
                    </div>

                    <div class="row">

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="Account holder name" name="account_name" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="Bank name" name="bank_name" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="Account number" name="account_number" maxlength="12" required>
                        </div>

                        <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                            <input type="text" class="form-control" placeholder="IFSC code" name="ifsc" required>
                        </div>

                        <div class="col-md-12">
                            <input type="submit" class="btn btn-primary submit-btn" value="Submit">
                        </div>

                    </div>

                </form>

            </div>
        </div>
    </div>

</body>

</html>
